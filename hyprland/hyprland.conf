################
### MONITORS ###
################
# Auto-detect, change resolution quickly via: hyprctl keyword monitor ,preferred,auto,1
monitor=,preferred,auto,1

#################
### AUTOSTART ###
#################
exec-once = waybar
exec-once = dunst
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = wl-paste --watch cliphist store
exec-once = hypridle
exec-once = swww-daemon
exec-once = swww img ~/.config/hypr/wallpaper.jpg --transition-type wipe --transition-duration 2
exec-once = nm-applet --indicator
exec-once = playerctld daemon
exec-once = pipewire
exec-once = pipewire-pulse
exec-once = wireplumber
exec-once = ~/.config/hypr/scripts/gamemode-setup.sh
exec-once = xsettingsd

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = MOZ_ENABLE_WAYLAND,1

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    col.active_border = rgba(d79921ff) rgba(fe8019ff) 45deg
    col.inactive_border = rgba(3c3836aa)
    resize_on_border = true
    allow_tearing = true   # for gaming low latency
    layout = dwindle
}

decoration {
    rounding = 12

    # Liquid Glass effect — layered blur + transparency
    active_opacity = 0.97
    inactive_opacity = 0.88
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 8
        passes = 3
        noise = 0.02
        contrast = 1.1
        brightness = 0.85
        vibrancy = 0.25
        vibrancy_darkness = 0.5
        special = true
        popups = true
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(0d0d0dcc)
        color_inactive = rgba(0d0d0d66)
        offset = 0 4
    }
}

animations {
    enabled = true
    first_launch_animation = true

    # Smooth Bezier curves
    bezier = overshot,    0.05, 0.9, 0.1, 1.1
    bezier = smoothOut,   0.36, 0,   0.66, -0.56
    bezier = smoothIn,    0.25, 1,   0.5,  1
    bezier = easeInOut,   0.4,  0,   0.2,  1
    bezier = spring,      0.68, -0.6, 0.32, 1.6
    bezier = linear,      0.0,  0.0, 1.0,  1.0

    # Window open/close — satisfying spring
    animation = windowsIn,  1, 5,  spring,  slide
    animation = windowsOut, 1, 4,  smoothOut, slide
    animation = windowsMove,1, 4,  easeInOut

    # Fade
    animation = fade,       1, 4,  smoothIn
    animation = fadeIn,     1, 5,  smoothIn
    animation = fadeOut,    1, 4,  smoothOut
    animation = fadeDim,    1, 4,  smoothIn

    # Workspaces
    animation = workspaces, 1, 5,  overshot, slidevert
    animation = specialWorkspace, 1, 5, overshot, slidevert

    # Layers (waybar, rofi, dunst)
    animation = layers,     1, 4,  overshot, slide
    animation = layersIn,   1, 5,  overshot, slide
    animation = layersOut,  1, 4,  smoothOut, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = true
    smart_resizing = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    enable_swallow = true
    swallow_regex = ^(kitty|foot)$
    focus_on_activate = true
    new_window_takes_over_fullscreen = 2
    initial_workspace_tracking = 1
    vrr = 1   # Variable Refresh Rate for gaming
}

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER
$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun

bind = $mainMod, Return,       exec, $terminal
bind = $mainMod, Q,            killactive
bind = $mainMod, M,            exit
bind = $mainMod, E,            exec, $fileManager
bind = $mainMod, V,            togglefloating
bind = $mainMod, R,            exec, $menu
bind = $mainMod, P,            pseudo
bind = $mainMod, J,            togglesplit
bind = $mainMod, F,            fullscreen
bind = $mainMod SHIFT, F,      fakefullscreen
bind = $mainMod, L,            exec, hyprlock
bind = $mainMod, B,            exec, pkill -SIGUSR1 waybar
bind = $mainMod, C,            exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = $mainMod, W,            exec, wallpaper-picker

# Screenshot
bind = , Print,                exec, grim -g "$(slurp)" - | wl-copy && notify-send "Screenshot" "Copied to clipboard"
bind = SHIFT, Print,           exec, grim ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png && notify-send "Screenshot" "Saved"

# Volume with sound feedback
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ && ~/.config/hypr/scripts/volume-notify.sh
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && ~/.config/hypr/scripts/volume-notify.sh
bind = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && ~/.config/hypr/scripts/volume-notify.sh
bind = , XF86AudioPlay,        exec, playerctl play-pause
bind = , XF86AudioNext,        exec, playerctl next
bind = , XF86AudioPrev,        exec, playerctl previous

# Brightness
bind = , XF86MonBrightnessUp,  exec, brightnessctl set +5% && notify-send -t 1500 "Brightness" "$(brightnessctl get)%"
bind = , XF86MonBrightnessDown,exec, brightnessctl set 5%- && notify-send -t 1500 "Brightness" "$(brightnessctl get)%"

# FPS overlay toggle
bind = $mainMod, G,            exec, ~/.config/hypr/scripts/fps-toggle.sh

# Resolution quick picker
bind = $mainMod SHIFT, R,      exec, ~/.config/hypr/scripts/resolution-picker.sh

# Move focus
bind = $mainMod, left,         movefocus, l
bind = $mainMod, right,        movefocus, r
bind = $mainMod, up,           movefocus, u
bind = $mainMod, down,         movefocus, d
bind = $mainMod, H,            movefocus, l
bind = $mainMod, L_key,        movefocus, r
bind = $mainMod, K,            movefocus, u
bind = $mainMod, J_key,        movefocus, d

# Switch workspaces
bind = $mainMod, 1,            workspace, 1
bind = $mainMod, 2,            workspace, 2
bind = $mainMod, 3,            workspace, 3
bind = $mainMod, 4,            workspace, 4
bind = $mainMod, 5,            workspace, 5
bind = $mainMod, 6,            workspace, 6
bind = $mainMod, 7,            workspace, 7
bind = $mainMod, 8,            workspace, 8
bind = $mainMod, 9,            workspace, 9
bind = $mainMod, 0,            workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, 1,      movetoworkspace, 1
bind = $mainMod SHIFT, 2,      movetoworkspace, 2
bind = $mainMod SHIFT, 3,      movetoworkspace, 3
bind = $mainMod SHIFT, 4,      movetoworkspace, 4
bind = $mainMod SHIFT, 5,      movetoworkspace, 5

# Scroll through workspaces
bind = $mainMod, mouse_down,   workspace, e+1
bind = $mainMod, mouse_up,     workspace, e-1

# Move/resize windows
bindm = $mainMod, mouse:272,   movewindow
bindm = $mainMod, mouse:273,   resizewindow

# System rollback
bind = $mainMod SHIFT, S,      exec, ~/.config/hypr/scripts/system-snapshot.sh

####################
### INPUT CONFIG ###
####################
input {
    kb_layout = us,ru
    kb_options = grp:alt_shift_toggle
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat    # raw input for gaming

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
        scroll_factor = 0.8
    }
}

gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
    workspace_swipe_invert = true
    workspace_swipe_min_speed_to_force = 30
    workspace_swipe_cancel_ratio = 0.5
}

cursor {
    no_hardware_cursors = false
    no_warps = false
}

####################
### WINDOW RULES ###
####################

# Floating windows
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = float, class:^(rofi)$

# Opacity rules
windowrulev2 = opacity 1.0 override 1.0 override, class:^(mpv)$
windowrulev2 = opacity 1.0 override 1.0 override, class:^(steam)$

# Gaming — tear allow
windowrulev2 = immediate, class:^(steam_app_)(.*)$
windowrulev2 = immediate, class:^(cs2)$
windowrulev2 = immediate, class:^(gamescope)$

# No border on fullscreen
windowrulev2 = noborder, fullscreen:1

# Size
windowrulev2 = size 900 600, class:^(pavucontrol)$
windowrulev2 = center, class:^(pavucontrol)$

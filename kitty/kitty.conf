# ╔══════════════════════════════════════════════════════╗
# ║          KITTY — made in Legacy                      ║
# ║          Gruvbox Dark · Ultra Edition                ║
# ╚══════════════════════════════════════════════════════╝

# ── Font ──────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        13.0

# Ligatures
font_features JetBrainsMonoNerdFont-Regular +liga +calt +ss01 +ss02
disable_ligatures never

# ── Cursor ────────────────────────────────────────────
cursor                  #fabd2f
cursor_text_color       #282828
cursor_shape            beam
cursor_beam_thickness   2.0
cursor_blink_interval   0.5
cursor_stop_blinking_after 15.0

# ── Scrollback ────────────────────────────────────────
scrollback_lines 10000
scrollback_pager bat --color always --style plain --pager 'less -RF'

# ── Mouse ─────────────────────────────────────────────
mouse_hide_wait      2.0
url_style            curly
url_color            #83a598
open_url_with        default
detect_urls          yes
copy_on_select       clipboard

# ── Performance ───────────────────────────────────────
sync_to_monitor      yes
repaint_delay        4
input_delay          2

# ── Bell ──────────────────────────────────────────────
enable_audio_bell    no
visual_bell_duration 0.1
visual_bell_color    #d79921
window_alert_on_bell yes

# ── Window ────────────────────────────────────────────
remember_window_size  no
initial_window_width  1000
initial_window_height 650
window_padding_width  16
window_padding_height 12
window_border_width   1pt
draw_minimal_borders  yes
active_border_color   #d79921
inactive_border_color #3c3836
bell_border_color     #fe8019

# ── Transparency / Blur ───────────────────────────────
background_opacity         0.88
background_blur            20
dynamic_background_opacity yes

# ── Tab bar ───────────────────────────────────────────
tab_bar_min_tabs          2
tab_bar_edge              bottom
tab_bar_style             powerline
tab_powerline_style       slanted
tab_title_template        " {index}: {title[:24]} "
active_tab_foreground     #282828
active_tab_background     #d79921
active_tab_font_style     bold
inactive_tab_foreground   #a89984
inactive_tab_background   #3c3836
inactive_tab_font_style   normal
tab_bar_background        #1d2021

# ── Colors — Gruvbox Dark ─────────────────────────────
foreground              #ebdbb2
background              #282828
selection_foreground    #282828
selection_background    #d79921

color0   #282828
color1   #cc241d
color2   #98971a
color3   #d79921
color4   #458588
color5   #b16286
color6   #689d6a
color7   #a89984
color8   #928374
color9   #fb4934
color10  #b8bb26
color11  #fabd2f
color12  #83a598
color13  #d3869b
color14  #8ec07c
color15  #ebdbb2

# ── Shell integration ─────────────────────────────────
shell_integration      enabled
term                   xterm-256color

# ── Keymaps ───────────────────────────────────────────
kitty_mod ctrl+shift

map kitty_mod+t       new_tab_with_cwd
map kitty_mod+w       close_tab
map kitty_mod+]       next_tab
map kitty_mod+[       previous_tab
map kitty_mod+enter   new_window_with_cwd
map kitty_mod+equal   change_font_size all +1.0
map kitty_mod+minus   change_font_size all -1.0
map kitty_mod+0       change_font_size all 0
map kitty_mod+c       copy_to_clipboard
map kitty_mod+v       paste_from_clipboard
map kitty_mod+f       show_scrollback
map kitty_mod+h       previous_window
map kitty_mod+l       next_window

# ── Startup session ───────────────────────────────────
startup_session ~/.config/kitty/startup.session

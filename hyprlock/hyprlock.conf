general {
    disable_loading_bar   = false
    hide_cursor           = true
    grace                 = 2
    no_fade_in            = false
    no_fade_out           = false
    ignore_empty_input    = false
    text_trim             = true
}

background {
    monitor               =
    path                  = ~/.config/hypr/wallpaper.jpg
    
    blur_passes           = 4
    blur_size             = 10
    noise                 = 0.02
    contrast              = 1.0
    brightness            = 0.6
    vibrancy              = 0.2
    vibrancy_darkness     = 0.4
}

# Clock — big center display
label {
    monitor               =
    text                  = cmd[update:1000] echo "$(date +"%H:%M")"
    color                 = rgba(250, 189, 47, 0.95)
    font_size             = 96
    font_family           = JetBrainsMono Nerd Font Bold
    shadow_passes         = 3
    shadow_size           = 8
    shadow_color          = rgba(0, 0, 0, 0.6)
    shadow_boost          = 1.2
    
    position              = 0, 80
    halign                = center
    valign                = center
}

# Date
label {
    monitor               =
    text                  = cmd[update:60000] echo "$(date +"%A, %d %B %Y")"
    color                 = rgba(235, 219, 178, 0.80)
    font_size             = 20
    font_family           = JetBrainsMono Nerd Font
    
    position              = 0, -20
    halign                = center
    valign                = center
}

# "made in Legacy" branding
label {
    monitor               =
    text                  = "  made in Legacy"
    color                 = rgba(146, 131, 116, 0.55)
    font_size             = 12
    font_family           = JetBrainsMono Nerd Font Italic
    
    position              = 0, -220
    halign                = center
    valign                = center
}

# Password input
input-field {
    monitor               =
    size                  = 280, 52
    outline_thickness     = 2
    dots_size             = 0.28
    dots_spacing          = 0.18
    dots_center           = true
    dots_rounding         = -1
    
    outer_color           = rgba(215, 153, 33, 0.6)
    inner_color           = rgba(40, 40, 40, 0.8)
    font_color            = rgba(235, 219, 178, 1.0)
    fade_on_empty         = true
    fade_timeout          = 2000
    
    placeholder_text      = <i>󰍁  Enter password...</i>
    hide_input            = false
    rounding              = 14
    
    check_color           = rgba(184, 187, 38, 0.9)
    fail_color            = rgba(251, 73, 52, 0.9)
    fail_text             = <i>  $ATTEMPTS attempt(s)</i>
    fail_timeout          = 2000
    fail_transition       = 300
    
    position              = 0, -150
    halign                = center
    valign                = center
    
    shadow_passes         = 2
    shadow_size           = 6
    shadow_color          = rgba(0,0,0,0.4)
}

# System info
label {
    monitor               =
    text                  = cmd[update:5000] echo "󰻠 $(cut -d' ' -f1 /proc/loadavg)  󰍛 $(free -h | awk '/^Mem:/{print $3"/"$2}')"
    color                 = rgba(168, 153, 132, 0.6)
    font_size             = 11
    font_family           = JetBrainsMono Nerd Font
    
    position              = 0, -280
    halign                = center
    valign                = center
}
